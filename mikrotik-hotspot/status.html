<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Skylink WiFi — Session Status</title>
  <meta http-equiv="refresh" content="60"><!-- auto-refresh every 60s -->
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #0f172a 0%, #1e3a5f 50%, #0f172a 100%);
      display: flex; align-items: center; justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      padding: 1rem;
    }
    .container { width: 100%; max-width: 400px; }

    .brand { text-align: center; margin-bottom: 1.5rem; }
    .brand svg { margin-bottom: .75rem; }
    .brand h1 { color: #fff; font-size: 1.25rem; font-weight: 700; }

    .card {
      background: #fff; border-radius: 20px; overflow: hidden;
      box-shadow: 0 24px 64px rgba(0,0,0,.35);
    }

    .card-header {
      background: linear-gradient(135deg, #1d4ed8, #2563eb);
      padding: 1.25rem 1.5rem; display: flex; align-items: center; gap: .75rem;
    }
    .status-dot {
      width: 10px; height: 10px; border-radius: 50%; background: #4ade80;
      box-shadow: 0 0 0 4px rgba(74,222,128,.3);
      animation: blink 1.5s ease-in-out infinite;
    }
    @keyframes blink {
      0%, 100% { opacity: 1; } 50% { opacity: .4; }
    }
    .card-header h2 { color: #fff; font-size: 1rem; font-weight: 700; }
    .card-header p  { color: #93c5fd; font-size: .8125rem; margin-top: .1rem; }

    .stats { padding: 1.5rem; }
    .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1.5rem; }

    .stat-box {
      background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 12px;
      padding: 1rem; text-align: center;
    }
    .stat-icon { font-size: 1.5rem; margin-bottom: .4rem; }
    .stat-value { font-size: 1.125rem; font-weight: 800; color: #1e293b; line-height: 1.2; }
    .stat-label { font-size: .7rem; color: #64748b; font-weight: 600;
                  text-transform: uppercase; letter-spacing: .05em; margin-top: .25rem; }

    .info-section { margin-bottom: 1.5rem; }
    .info-row {
      display: flex; justify-content: space-between; align-items: center;
      padding: .625rem 0; border-bottom: 1px solid #f1f5f9; font-size: .875rem;
    }
    .info-row:last-child { border-bottom: none; }
    .info-key { color: #64748b; font-weight: 500; }
    .info-val { color: #1e293b; font-weight: 700; font-family: monospace; font-size: .8125rem; }

    .actions { display: flex; flex-direction: column; gap: .5rem; }
    .btn {
      display: flex; align-items: center; justify-content: center; gap: .5rem;
      padding: .875rem; border: none; border-radius: 10px; font-size: .875rem;
      font-weight: 700; cursor: pointer; text-decoration: none; transition: background .15s;
    }
    .btn-danger  { background: #ef4444; color: #fff; }
    .btn-danger:hover { background: #dc2626; }
    .btn-ghost { background: #f1f5f9; color: #475569; }
    .btn-ghost:hover { background: #e2e8f0; }

    .refresh-note { text-align: center; color: #94a3b8; font-size: .75rem; margin-top: 1rem; }
  </style>
</head>
<body>
<div class="container">

  <div class="brand">
    <svg width="36" height="36" fill="none" stroke="#60a5fa" stroke-width="2.5"
         stroke-linecap="round" viewBox="0 0 24 24">
      <path d="M5 12.55a11 11 0 0 1 14.08 0"/>
      <path d="M1.42 9a16 16 0 0 1 21.16 0"/>
      <path d="M8.53 16.11a6 6 0 0 1 6.95 0"/>
      <circle cx="12" cy="20" r="1" fill="#60a5fa" stroke="none"/>
    </svg>
    <h1>Skylink WiFi</h1>
  </div>

  <div class="card">
    <div class="card-header">
      <div class="status-dot"></div>
      <div>
        <h2>Session Active</h2>
        <p>$(username)</p>
      </div>
    </div>

    <div class="stats">

      <div class="stat-grid">
        <div class="stat-box">
          <div class="stat-icon">⏱</div>
          <div class="stat-value">$(uptime)</div>
          <div class="stat-label">Uptime</div>
        </div>
        <div class="stat-box">
          <div class="stat-icon">⏳</div>
          <div class="stat-value">$(session-time-left)</div>
          <div class="stat-label">Time Left</div>
        </div>
        <div class="stat-box">
          <div class="stat-icon">⬇</div>
          <div class="stat-value" id="rxVal">$(bytes-in)</div>
          <div class="stat-label">Downloaded</div>
        </div>
        <div class="stat-box">
          <div class="stat-icon">⬆</div>
          <div class="stat-value" id="txVal">$(bytes-out)</div>
          <div class="stat-label">Uploaded</div>
        </div>
      </div>

      <div class="info-section">
        <div class="info-row">
          <span class="info-key">IP Address</span>
          <span class="info-val">$(ip)</span>
        </div>
        <div class="info-row">
          <span class="info-key">MAC Address</span>
          <span class="info-val">$(mac)</span>
        </div>
      </div>

      <div class="actions">
        <a class="btn btn-danger" href="$(link-logout)">
          <svg width="16" height="16" fill="none" stroke="#fff" stroke-width="2.5" viewBox="0 0 24 24">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
            <polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/>
          </svg>
          Disconnect Session
        </a>
        <a class="btn btn-ghost" href="$(link-status)">
          <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/>
            <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
          </svg>
          Refresh Status
        </a>
      </div>
    </div>
  </div>

  <p class="refresh-note">Page auto-refreshes every 60 seconds</p>
</div>

<script>
  /* Format raw bytes from MikroTik into human-readable */
  function fmtBytes(el) {
    var raw = parseInt(el.textContent, 10);
    if (isNaN(raw)) return;
    var units = ['B', 'KB', 'MB', 'GB'];
    var i = 0;
    while (raw >= 1024 && i < units.length - 1) { raw /= 1024; i++; }
    el.textContent = raw.toFixed(i > 0 ? 2 : 0) + ' ' + units[i];
  }
  fmtBytes(document.getElementById('rxVal'));
  fmtBytes(document.getElementById('txVal'));
</script>
</body>
</html>
